{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursfeedback</title>
    <link rel="stylesheet" href="{% static 'feedback_azubi/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="{% static 'dashboard/Deutsche_Rentenversicherung_Bund_logo.svg.png' %}" alt="DRVBUND">
        </div>
<h2 class="barlow-semibold"><span style="color: #6b85a6;">Ausbildungstracker</span></h2>
      <h3 class='barlow-semibold'>Kursfeedback</h3>

    <form action="{% url 'submit_feedback' %}" method="post" class="feedback-form">
        {% csrf_token %}

        <div class="form-group">
            <label>Kursname</label>
            <input type="text" value="{{ anzeigename }}" readonly style="background-color: #e9ecef; color: #666;">
            <input type="hidden" name="kursname" value="{{ kurs.id }}">
        </div>

        <div class="form-group">
            <label>Kursleitung</label>
            <input type="text" name="kursleitung" required>
        </div>

        <div class="form-group">
            <label>Lehrgangsnummer</label>
            <input type="text" name="lehrgangsnummer" required>
        </div>

	<br>

        <div class="form-group">
            <label>Wie zufrieden waren Sie insgesamt mit dem Kurs?</label>
            <div class="rating-container">
                {% for i in "0987654321"|make_list %}
                <input type="radio" name="bewertung_kurs" id="kurs_{{ forloop.revcounter }}" value="{{ forloop.revcounter }}" required>
                <label for="kurs_{{ forloop.revcounter }}">★</label>
                {% endfor %}
            </div>
        </div>

        <div class="form-group">
            <label>Wie schätzen Sie die fachliche Kompetenz der Kursleitung ein?</label>
            <div class="rating-container">
                {% for i in "0987654321"|make_list %}
                <input type="radio" name="kompetenz_dozent" id="komp_{{ forloop.revcounter }}" value="{{ forloop.revcounter }}" required>
                <label for="komp_{{ forloop.revcounter }}">★</label>
                {% endfor %}
            </div>
        </div>

        <div class="form-group">
            <label>Als wie hilfreich empfanden Sie das ILIAS-Modul?</label>
            <div class="rating-container">
                {% for i in "0987654321"|make_list %}
                <input type="radio" name="ilias_modul" id="ilias_{{ forloop.revcounter }}" value="{{ forloop.revcounter }}" required>
                <label for="ilias_{{ forloop.revcounter }}">★</label>
                {% endfor %}
            </div>
        </div>

        <div class="form-group">
            <label>Wie schätzen Sie Ihren eigenen Lernerfolg ein?</label>
            <div class="rating-container">
                {% for i in "0987654321"|make_list %}
                <input type="radio" name="selbsteinschaetzung" id="self_{{ forloop.revcounter }}" value="{{ forloop.revcounter }}" required>
                <label for="self_{{ forloop.revcounter }}">★</label>
                {% endfor %}
            </div>
        </div>

	<br>

        <div class="form-group">
            <label>Sonstige Anmerkungen</label>
            <textarea name="anmerkungen" rows="4"></textarea>
        </div>

        <button type="submit" class="submit-btn">Feedback absenden</button>
    </form>
</div>

</body>
</html>
