{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{% static 'dashboard/style.css' %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class='container'>

    <img src="{% static 'dashboard/Deutsche_Rentenversicherung_Bund_logo.svg.png' %}" alt="DRVBUND">
    <h2 class="barlow-semibold"><span style="color: #6b85a6;">Ausbildungstracker</span></h2>

    <div class='nav'>
      <h3 class='barlow-semibold'>Kursliste:</h3>
      <a href="{% url 'kursliste' 'BS' %}" {% if liste == 'BS' %}class="active"{% endif %}>Berufsschule</a>    
      <a href="{% url 'kursliste' 'DRV' %}" {% if liste == 'DRV' %}class="active"{% endif %}>intern</a>
    </div>
    <div style="display: flex; justify-content: center; width: 100%;">
    <canvas id="statusChart" style="max-width: 350px; max-height: 200px;"></canvas>
    </div>
    <form method="post">
      {% csrf_token %}
      <table>
        <tr><th class='barlow-semibold'>Kursname</th><th class='barlow-semibold'>Status</th></tr>
        {% for kurs in kurse %}
        <tr>
          <td class='barlow'>{{ kurs.Kursname }}</td>
          <td>
            <select name="status_{{ kurs.Kursname }}">
              {% for option in status_optionen %}
            <option value="{{ option }}"
                    {% if kurs.Status == option %}selected{% endif %}>
            {{ option }}
            </option>
            {% endfor %}
          </select>
        </td>
      </tr>
      {% endfor %}
      <td></td>
      <td><button type="submit">Speichern</button></td>
    </table>
  </form>
</div>
</div>
<script>
    const counts = {
        offen: {{ status_counts.offen|default:0 }},
        in_bearbeitung: {{ status_counts.in_bearbeitung|default:0 }},
        fertig: {{ status_counts.fertig|default:0 }},
    };

    new Chart(document.getElementById('statusChart'), {
      type: 'doughnut',
      data: {
        labels: ['Offen', 'In Bearbeitung', 'Fertig'],
        datasets: [{
          data: [counts.offen, counts.in_bearbeitung, counts.fertig],
          backgroundColor: ['#e0e0e0', '#4a6fa5', '#3a5a8c'],
        }]
      },
      options: {
        maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: {
            position: 'right',
            labels: {
              boxWidth: 12,
              font: { size: 11 }
            }
          }
        }
      }    });
</script>
</body>
</html>
