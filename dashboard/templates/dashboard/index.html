<!DOCTYPE html>
<html>
<head><title>Dashboard</title></head>
<body>
<h1>Kursliste {{ liste }}</h1>

<a href="{% url 'kursliste' 'BS' %}">BS</a> |
<a href="{% url 'kursliste' 'DRV' %}">DRV</a>

<form method="post">
  {% csrf_token %}
  <table>
    <tr><th>Kursname</th><th>Status</th></tr>
    {% for kurs in kurse %}
    <tr>
      <td>{{ kurs.Kursname }}</td>
      <td>
        <select name="status_{{ kurs.Kursname }}">
          {% for option in status_optionen %}
          <option value="{{ option }}"
            {% if kurs.Status == option %}selected{% endif %}>
            {{ option }}
          </option>
          {% endfor %}
        </select>
      </td>
    </tr>
    {% endfor %}
  </table>
  <button type="submit">Speichern</button>
</form>
</body>
</html>
