{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{% static 'dashboard/style.css' %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class='container'>

  <div class="header-container">
    <img src="{% static 'dashboard/Deutsche_Rentenversicherung_Bund_logo.svg.png' %}" alt="DRVBUND">
    <form action="{% url 'logout' %}" method="post" style="display: inline;">
    {% csrf_token %}
    <span class="logout">
    <button>
	   <span class="username"> {{user.username}} </span>
	   <span style="text-decoration: none;">abmelden</span>
    </button>
    </span>
</form>
  </div>
    <h2 class="barlow-semibold"><span style="color: #6b85a6;">Ausbildungstracker</span></h2>

      <h3 class='barlow-semibold'>Kursfortschritt:</h3>
    <div style="display: flex; justify-content: center; width: 100%; margin: 1rem;">
      <canvas id="statusChart" style="max-width: 350px; max-height: 200px;"></canvas>
    </div>

    <div class='nav'>
	<a href="{% url 'kursliste' 'gesamtansicht' %}" {% if aktuelle_liste == 'gesamtansicht' %}class="active"{% endif %}>Gesamt</a>    
 
      <a href="{% url 'kursliste' 'BS' %}" {% if aktuelle_liste == 'BS' %}class="active"{% endif %}>Berufsschule</a>    
      <a href="{% url 'kursliste' 'DRV' %}" {% if aktuelle_liste == 'DRV' %}class="active"{% endif %}>intern</a>
    </div>

    <form method="post">
      {% csrf_token %}
      <table>
        <tr><th class='barlow-semibold'>Kursname</th><th class='barlow-semibold'>Status</th></tr>
        {% for kurs in kurse %}
        <tr>
          <td class='barlow'>{{ kurs.Kursname }}</td>
          <td>
            <select name="status_{{ kurs.Kursname }}" class="form-select">
    
    <option value="offen" {% if kurs.Status == 'offen' %}selected{% endif %}>
        offen
    </option>
    
    <option value="in Bearbeitung" {% if kurs.Status == 'in Bearbeitung' %}selected{% endif %}>
        in Bearbeitung
    </option>
    
    <option value="abgeschlossen" {% if kurs.Status == 'abgeschlossen' %}selected{% endif %}>
        abgeschlossen
    </option>

</select>        </td>
      </tr>
      {% endfor %}
      <td></td>
      <td><button type="submit">Speichern</button></td>
    </table>
  </form>
</div>
</div>
<script>
    const counts = {
        offen: {{ status_counts.offen|default:0 }},
        in_bearbeitung: {{ status_counts.in_bearbeitung|default:0 }},
        abgeschlossen: {{ status_counts.abgeschlossen|default:0 }},
    };

    new Chart(document.getElementById('statusChart'), {
      type: 'doughnut',
      data: {
        labels: ['offen', 'in Bearbeitung', 'abgeschlossen'],
        datasets: [{
          data: [counts.offen, counts.in_bearbeitung, counts.abgeschlossen],
          backgroundColor: ['#e0e0e0', '#d7df24', '#6b85a6'],
        }]
      },
      options: {
        maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: {
            position: 'left',
            labels: {
              boxWidth: 12,
              font: { size: 11 }
            }
          }
        }
      }    });
</script>
</body>
</html>
